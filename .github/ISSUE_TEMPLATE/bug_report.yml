name: Bug Report
description: Report a bug in Crucible
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include logs if relevant.
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`
      placeholder: go1.26.0 darwin/arm64
    validations:
      required: true

  - type: input
    id: crucible-version
    attributes:
      label: Crucible version
      description: Output of `crucible -v`
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Google Vertex AI
        - Google Gemini API
        - Anthropic
        - OpenAI
        - Other / custom
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Relevant parts of your crucible.json (redact API keys).
      render: json
    validations:
      required: false
